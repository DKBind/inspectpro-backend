server:
  servlet:
    context-path: /api/v1
spring:
  application:
    name: inspectpro
  datasource:
    url: jdbc:postgresql://hip-inspectpro.cxgys808ux3j.ap-south-1.rds.amazonaws.com:5432/inspectpro
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://cognito-idp.ap-south-1.amazonaws.com/${COGNITO_USER_POOL_ID}
          jwk-set-uri: https://cognito-idp.ap-south-1.amazonaws.com/${COGNITO_USER_POOL_ID}/.well-known/jwks.json

app:
  security:
    cors:
      allowed-origins: "*"
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: "*"
      allow-credentials: true
    public-apis:
      - /public/**
      - /actuator/health
      - /swagger-ui/**
      - /v3/api-docs/**
